services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen
    ports:
      - "8000:8000"
    volumes:
      - /home/ubuntu/vllm_test:/data
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model Qwen/Qwen3-VL-4B-Instruct
      --trust-remote-code
      --max-model-len 12000
      --allowed-local-media-path /data
      --gpu-memory-utilization 0.65
      --max-num-seqs 1
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    container_name: whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=turbo
      - ASR_ENGINE=openai_whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  default:
    name: ai_network
